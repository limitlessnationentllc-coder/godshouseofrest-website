backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "godshouseofrest"
public_folder: "/godshouseofrest"

collections:

  - name: "events"
    label: "Events"
    files:
      - name: "events"
        label: "Upcoming Events"
        file: "_data/events.json"
        fields:
          - name: "events"
            label: "Events List"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - {label: "Title",       name: "title",       widget: "string"}
              - {label: "Date",        name: "date",        widget: "string",   hint: "e.g. Sunday, July 6, 2026"}
              - {label: "Time",        name: "time",        widget: "string",   hint: "e.g. 10:00 AM"}
              - {label: "Location",    name: "location",    widget: "string",   default: "618 E St, Chula Vista, CA 91910"}
              - {label: "Category",    name: "category",    widget: "select",   options: ["Worship Service","Bible Study","Youth","Women's Ministry","Men's Ministry","Community Outreach","Special Event"]}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Image",       name: "image",       widget: "image",    required: false}
              - {label: "RSVP / Link", name: "link",        widget: "string",   required: false}

  - name: "news"
    label: "News & Announcements"
    files:
      - name: "news"
        label: "News Posts"
        file: "_data/news.json"
        fields:
          - name: "posts"
            label: "Posts"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - {label: "Title",    name: "title",    widget: "string"}
              - {label: "Date",     name: "date",     widget: "string",  hint: "e.g. June 19, 2026"}
              - {label: "Category", name: "category", widget: "string",  hint: "e.g. Youth Ministry, Announcement"}
              - {label: "Summary",  name: "summary",  widget: "text"}
              - {label: "Image",    name: "image",    widget: "image",   required: false}
              - {label: "Link",     name: "link",     widget: "string",  required: false, hint: "Full article URL if it lives on another page"}
