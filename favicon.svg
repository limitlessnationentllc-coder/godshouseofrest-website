<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Gold outer ring -->
  <circle cx="16" cy="16" r="15.5" fill="#D4AF37"/>
  <!-- Navy ring gap -->
  <circle cx="16" cy="16" r="14.5" fill="#0A1F4F"/>
  <!-- Second gold ring -->
  <circle cx="16" cy="16" r="14" fill="#D4AF37" opacity="0.6"/>
  <!-- Deep blue fill -->
  <circle cx="16" cy="16" r="13" fill="#1E4FBF"/>
  <!-- Sky blue center glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#4FD6FF" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#1E4FBF" stop-opacity="0"/>
  </radialGradient>
  <circle cx="16" cy="16" r="13" fill="url(#glow)"/>
  <!-- Light rays -->
  <g stroke="white" stroke-linecap="round" opacity="0.25">
    <line x1="16" y1="5" x2="16" y2="3" stroke-width="1.2"/>
    <line x1="20.5" y1="6.2" x2="21.8" y2="4.5" stroke-width="1"/>
    <line x1="11.5" y1="6.2" x2="10.2" y2="4.5" stroke-width="1"/>
    <line x1="23.5" y1="9.5" x2="25.2" y2="8.2" stroke-width="0.9"/>
    <line x1="8.5" y1="9.5" x2="6.8" y2="8.2" stroke-width="0.9"/>
  </g>
  <!-- Dove wings left -->
  <path d="M16 9.5 C14 7.5 10.5 8 9.5 9.5 C11 8.8 13.5 9 16 10.5Z" fill="white"/>
  <!-- Dove wings right -->
  <path d="M16 9.5 C18 7.5 21.5 8 22.5 9.5 C21 8.8 18.5 9 16 10.5Z" fill="white"/>
  <!-- Dove body -->
  <ellipse cx="16" cy="10" rx="2.2" ry="1.4" fill="white"/>
  <!-- Dove head -->
  <circle cx="17.2" cy="8.8" r="1.1" fill="white"/>
  <!-- Central worship figure -->
  <ellipse cx="16" cy="20" rx="2" ry="2.8" fill="#0A1F4F" opacity="0.85"/>
  <circle cx="16" cy="17" r="1.1" fill="#0A1F4F" opacity="0.85"/>
  <line x1="16" y1="18.5" x2="12.8" y2="16" stroke="#0A1F4F" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="16" y1="18.5" x2="19.2" y2="16" stroke="#0A1F4F" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Congregation silhouettes -->
  <ellipse cx="10.5" cy="26" rx="2" ry="3.5" fill="#4FD6FF" opacity="0.5"/>
  <ellipse cx="21.5" cy="26" rx="2" ry="3.5" fill="#4FD6FF" opacity="0.5"/>
  <ellipse cx="6.5" cy="27.5" rx="1.6" ry="2.8" fill="#4FD6FF" opacity="0.3"/>
  <ellipse cx="25.5" cy="27.5" rx="1.6" ry="2.8" fill="#4FD6FF" opacity="0.3"/>
</svg>
